<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Spoorthi C — QA Automation Engineer</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #18181f;
      --border: #2a2a36;
      --accent: #c8f060;
      --accent2: #60d4f0;
      --text: #e8e8f0;
      --muted: #7070a0;
      --dim: #3a3a55;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* --- NOISE OVERLAY --- */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.4;
    }

    /* --- GLOW ORBS --- */
    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); pointer-events: none; z-index: 0;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 400px; height: 400px; background: rgba(200,240,96,0.06); top: -100px; right: -80px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(96,212,240,0.05); bottom: 200px; left: -80px; animation-delay: -6s; }
    @keyframes drift { from { transform: translate(0,0); } to { transform: translate(30px, 20px); } }

    /* --- LAYOUT --- */
    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; position: relative; z-index: 1; }

    /* --- HEADER --- */
    header {
      min-height: 100vh; display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center; gap: 4rem;
      padding: 6rem 0 4rem;
      position: relative;
    }

    .header-left { animation: fadeUp 0.9s ease both; }
    .header-right { animation: fadeUp 0.9s ease 0.2s both; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 1.5rem;
    }

    .name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(3.5rem, 7vw, 6rem);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .name span { color: var(--accent); }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 1rem; color: var(--muted);
      margin-top: 1.5rem; line-height: 1.8;
    }

    .contacts {
      margin-top: 2.5rem;
      display: flex; flex-direction: column; gap: 0.5rem;
    }

    .contact-item {
      display: flex; align-items: center; gap: 0.75rem;
      font-family: 'DM Mono', monospace; font-size: 0.8rem;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s;
    }
    .contact-item:hover { color: var(--accent); }
    .contact-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    /* right side summary card */
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 2.5rem;
      position: relative; overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
    }
    .summary-card p {
      color: var(--text); font-size: 0.95rem; line-height: 1.85;
    }
    .summary-card .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--accent2); margin-bottom: 1rem;
    }

    /* stat row */
    .stat-row {
      display: flex; gap: 2rem; margin-top: 2rem;
      padding-top: 2rem; border-top: 1px solid var(--border);
    }
    .stat { flex: 1; }
    .stat-num {
      font-family: 'Syne', sans-serif; font-size: 2rem;
      font-weight: 800; color: var(--accent);
    }
    .stat-desc {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; color: var(--muted);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-top: 0.25rem;
    }

    /* --- SCROLL INDICATOR --- */
    .scroll-hint {
      position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
      animation: fadeUp 1s ease 0.8s both;
    }
    .scroll-hint span {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim);
    }
    .scroll-line {
      width: 1px; height: 50px; background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

    /* --- SECTION LAYOUT --- */
    section { padding: 6rem 0; border-top: 1px solid var(--border); }

    .section-header {
      display: flex; align-items: baseline; gap: 2rem;
      margin-bottom: 4rem;
    }
    .section-num {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--dim); letter-spacing: 0.1em;
    }
    .section-title {
      font-family: 'Syne', sans-serif; font-size: 2.5rem;
      font-weight: 800; letter-spacing: -0.03em;
    }
    .section-line {
      flex: 1; height: 1px; background: var(--border);
    }

    /* --- EXPERIENCE --- */
    .exp-block {
      display: grid; grid-template-columns: 200px 1fr; gap: 3rem;
      padding-bottom: 4rem; margin-bottom: 4rem;
      border-bottom: 1px solid var(--border);
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .exp-block.visible { opacity: 1; transform: translateY(0); }
    .exp-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

    .exp-meta { padding-top: 0.25rem; }
    .exp-company {
      font-family: 'Syne', sans-serif; font-size: 0.85rem;
      font-weight: 700; color: var(--accent); letter-spacing: 0.05em;
    }
    .exp-date {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--muted); margin-top: 0.4rem;
    }
    .exp-projects {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      color: var(--dim); margin-top: 0.75rem; line-height: 1.7;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    .exp-content h3 {
      font-family: 'Syne', sans-serif; font-size: 1.6rem;
      font-weight: 700; margin-bottom: 1.75rem; letter-spacing: -0.02em;
    }

    .exp-items { display: flex; flex-direction: column; gap: 1.25rem; }
    .exp-item {
      display: grid; grid-template-columns: auto 1fr; gap: 1rem;
      align-items: start;
    }
    .exp-tag {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent2); background: rgba(96,212,240,0.07);
      border: 1px solid rgba(96,212,240,0.2);
      padding: 0.2rem 0.6rem; border-radius: 2px;
      white-space: nowrap; margin-top: 0.15rem;
    }
    .exp-desc { font-size: 0.9rem; color: var(--text); line-height: 1.7; }

    /* --- SKILLS --- */
    .skills-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }

    .skill-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 2px; padding: 1.75rem;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.5s ease, transform 0.5s ease, border-color 0.3s;
    }
    .skill-card.visible { opacity: 1; transform: translateY(0); }
    .skill-card:hover { border-color: var(--accent); }

    .skill-card-title {
      font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
      color: var(--accent); margin-bottom: 1.25rem; letter-spacing: 0.03em;
    }
    .skill-pills { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .pill {
      font-family: 'DM Mono', monospace; font-size: 0.7rem;
      color: var(--muted); background: var(--surface2);
      border: 1px solid var(--dim); padding: 0.3rem 0.7rem;
      border-radius: 2px; transition: all 0.2s;
    }
    .pill:hover { color: var(--text); border-color: var(--accent); }

    /* --- EDUCATION --- */
    .edu-block {
      display: grid; grid-template-columns: 200px 1fr; gap: 3rem; align-items: start;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .edu-block.visible { opacity: 1; transform: translateY(0); }

    .edu-badge {
      background: var(--surface); border: 1px solid var(--border);
      padding: 1.5rem; text-align: center;
    }
    .edu-badge .icon { font-size: 2rem; margin-bottom: 0.5rem; }
    .edu-badge-label {
      font-family: 'DM Mono', monospace; font-size: 0.6rem;
      letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent);
    }
    .edu-degree {
      font-family: 'Syne', sans-serif; font-size: 1.5rem;
      font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.02em;
    }
    .edu-school { color: var(--accent2); font-size: 0.9rem; margin-bottom: 0.5rem; }
    .edu-years {
      font-family: 'DM Mono', monospace; font-size: 0.75rem; color: var(--muted);
    }

    /* --- LANGUAGES --- */
    .lang-row { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 2rem; }
    .lang-chip {
      font-family: 'DM Mono', monospace; font-size: 0.75rem;
      color: var(--text); background: var(--surface2);
      border: 1px solid var(--border); padding: 0.5rem 1.25rem;
      border-radius: 2px;
    }

    /* --- FOOTER --- */
    footer {
      border-top: 1px solid var(--border);
      padding: 2.5rem 0;
      display: flex; justify-content: space-between; align-items: center;
      position: relative; z-index: 1;
    }
    .footer-name {
      font-family: 'Syne', sans-serif; font-size: 1rem;
      font-weight: 800; letter-spacing: -0.02em;
    }
    .footer-note {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      color: var(--dim); letter-spacing: 0.1em;
    }

    /* --- RESPONSIVE --- */
    @media (max-width: 768px) {
      header { grid-template-columns: 1fr; min-height: auto; padding: 4rem 0 3rem; gap: 2rem; }
      .exp-block, .edu-block { grid-template-columns: 1fr; gap: 1.5rem; }
      .exp-meta { border-bottom: 1px solid var(--border); padding-bottom: 1rem; }
      .stat-row { gap: 1.5rem; }
      .section-title { font-size: 1.8rem; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
      .scroll-hint { display: none; }
    }
  </style>
</head>
